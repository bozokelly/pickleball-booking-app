name: Web Quality Gate

on:
  pull_request:
    branches: [main]
    paths:
      - "pickleball-web/**"
      - ".github/workflows/web-quality-gate.yml"
  push:
    branches: [main]
    paths:
      - "pickleball-web/**"
      - ".github/workflows/web-quality-gate.yml"

jobs:
  quality:
    name: Lint, Typecheck, Build (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pickleball-web
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pickleball-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
